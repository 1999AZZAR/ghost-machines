version: '3.8'

services:
  ubuntu-container:
    build: .
    image: ubuntu-template:latest
    container_name: ubuntu-container
    restart: unless-stopped
    command: /usr/sbin/sshd -D
    ports:
      - "2223:22"
    cpuset: "0"
    volumes:
      - ${LXCFS_CPUINFO:-/dev/null}:/proc/cpuinfo:ro
      - ${LXCFS_MEMINFO:-/dev/null}:/proc/meminfo:ro
      - ${LXCFS_STAT:-/dev/null}:/proc/stat:ro
      - ${LXCFS_SWAPS:-/dev/null}:/proc/swaps:ro
      - ${LXCFS_UPTIME:-/dev/null}:/proc/uptime:ro
      - ./mounts/ubuntu1:/home/ubuntu
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 8G
    networks:
      - sandbox_net

  ubuntu2:
    build: .
    image: ubuntu-template:latest
    container_name: ubuntu2
    restart: unless-stopped
    command: /usr/sbin/sshd -D
    ports:
      - "2224:22"
    cpuset: "1"
    volumes:
      - ${LXCFS_CPUINFO:-/dev/null}:/proc/cpuinfo:ro
      - ${LXCFS_MEMINFO:-/dev/null}:/proc/meminfo:ro
      - ${LXCFS_STAT:-/dev/null}:/proc/stat:ro
      - ${LXCFS_SWAPS:-/dev/null}:/proc/swaps:ro
      - ${LXCFS_UPTIME:-/dev/null}:/proc/uptime:ro
      - ./mounts/ubuntu2:/home/ubuntu
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 8G
    networks:
      - sandbox_net

networks:
  sandbox_net:
    name: ghost_sandbox
    driver: bridge
